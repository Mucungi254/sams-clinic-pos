{% extends "layout.html" %}
{% block content %}
<h2>Suppliers</h2>
<a href="{{ url_for('add_supplier') }}" class="btn btn-success mb-3"><i class="bi bi-plus-circle"></i> Add Supplier</a>
<table class="table table-bordered table-striped">
    <thead class="table-dark">
        <tr><th>Name</th><th>Phone</th><th>Email</th><th>Actions</th></tr>
    </thead>
    <tbody>
    {% for s in suppliers %}
    <tr>
        <td>{{ s.name }}</td>
        <td>{{ s.phone or '' }}</td>
        <td>{{ s.email or '' }}</td>
        <td><a href="{{ url_for('edit_supplier', id=s.id) }}" class="btn btn-sm btn-warning"><i class="bi bi-pencil"></i></a></td>
    </tr>
    {% else %}
    <tr><td colspan="4" class="text-center">No suppliers found.</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
