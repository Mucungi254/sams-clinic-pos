{% extends "layout.html" %}
{% block content %}
<h2>Pharmacist Dashboard – {{ branch.name }}</h2>
<div class="row">
    <div class="col-md-4">
        <div class="stat-card text-center">
            <h5>Low Stock Items</h5>
            <h3>{{ low_stock }}</h3>
            <a href="{{ url_for('products') }}" class="btn btn-sm btn-outline-primary mt-2">View Products</a>
        </div>
    </div>
    <div class="col-md-4">
        <div class="stat-card text-center">
            <h5>Expiring Medicines</h5>
            <h3>{{ expiring }}</h3>
            <a href="{{ url_for('expiry_alerts') }}" class="btn btn-sm btn-outline-danger mt-2">View Alerts</a>
        </div>
    </div>
</div>
{% endblock %}
